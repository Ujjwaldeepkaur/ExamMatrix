<!DOCTYPE html>
<html>
<head>
    <title>ExamMatrix Registration</title>
</head>
<body style="font-family:Arial; text-align:center; background:#eef2ff;">

<h1>ExamMatrix Registration Portal</h1>

<h2>Student Registration</h2>

<form action="/register" method="POST">
    <input type="hidden" name="role" value="student">

    <input type="text" name="name" placeholder="Student Name" required><br><br>
    <input type="email" name="email" placeholder="Email" required><br><br>
    <input type="password" name="password" placeholder="Password" required><br><br>

    <button type="submit">Register as Student</button>
</form>

<hr>

<h2>Teacher Registration</h2>

<form action="/register" method="POST">
    <input type="hidden" name="role" value="teacher">

    <input type="text" name="name" placeholder="Teacher Name" required><br><br>
    <input type="email" name="email" placeholder="Email" required><br><br>
    <input type="password" name="password" placeholder="Password" required><br><br>

    <button type="submit">Register as Teacher</button>
</form>

<hr>

<h2>Already Registered?</h2>

<a href="/login.html">Go to Login Page</a>

</body>
</html>
