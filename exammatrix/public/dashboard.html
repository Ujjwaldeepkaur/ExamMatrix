<!DOCTYPE html>
<html>
<head>
    <title>Create Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 800px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 25px;
        }

        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        a {
            text-decoration: none;
            background: #27ae60;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 20px;
        }

        a:hover {
            background: #1e8449;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Create New Test</h1>

    <form action="/createTest" method="POST">

        <input type="text" name="testName" placeholder="Enter Test Name" required>
        <br>

        <input type="text" name="subject" placeholder="Enter Subject Name" required>
        <br>

        <input type="text" name="question" placeholder="Enter Question" required>
        <br>

        <input type="text" name="option1" placeholder="Option 1" required>
        <br>

        <input type="text" name="option2" placeholder="Option 2" required>
        <br>

        <input type="text" name="option3" placeholder="Option 3" required>
        <br>

        <input type="text" name="option4" placeholder="Option 4" required>
        <br>

        <input type="text" name="answer" placeholder="Correct Answer" required>
        <br><br>

        <button type="submit">Create Test</button>

    </form>

    <br>

    <a href="/teacher-dashboard">Back to Dashboard</a>

</div>

</body>
</html>
