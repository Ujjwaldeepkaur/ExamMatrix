<!DOCTYPE html>
<html>
<head>
    <title>Attempt Test</title>
</head>
<body style="font-family:Arial; text-align:center; background:#e3f2fd;">

<h1>Attempt Test</h1>

<form action="/submitTest" method="POST">

    <input type="text" name="name" placeholder="Enter Your Name" required><br><br>

    <input type="text" name="roll" placeholder="Enter Roll Number" required><br><br>

    <h3>1. What does CPU stand for?</h3>
    <input type="radio" name="q1" value="Central Processing Unit" required> Central Processing Unit<br>
    <input type="radio" name="q1" value="Computer Personal Unit"> Computer Personal Unit<br><br>

    <h3>2. What is full form of RAM?</h3>
    <input type="radio" name="q2" value="Random Access Memory" required> Random Access Memory<br>
    <input type="radio" name="q2" value="Read Access Memory"> Read Access Memory<br><br>

    <h3>3. Which language is used for styling web pages?</h3>
    <input type="radio" name="q3" value="CSS" required> CSS<br>
    <input type="radio" name="q3" value="Java"> Java<br><br>

    <button type="submit">Submit Test</button>

</form>

<br><br>
